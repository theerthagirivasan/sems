<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .welcomeContainer {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 900px;
            margin-bottom: 20px;
        }
        #welcomeTag {
            font-size: 1.5rem;
            color: #333;
        }
        #logoutBtn {
            padding: 8px 16px;
            font-size: 14px;
            background-color: #ff5c5c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #logoutBtn:hover {
            background-color: #ff4040;
        }
        table {
            width: 90%;
            max-width: 900px;
            border-collapse: collapse;
            margin-bottom: 30px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #4e54c8;
            color: #fff;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #ececff;
        }
        .input-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .input-container table td {
            padding: 8px;
        }
        input {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #create-btn {
            background-color: #4e54c8;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        #create-btn:hover {
            background-color: #6b70e0;
        }
        .action-btn {
            padding: 5px 10px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #fff;
        }
        .approve {
            background-color: #4CAF50;
        }
        .reject {
            background-color: #f44336;
        }
        .edit {
            background-color: #2196F3;
        }
        .delete {
            background-color: #ff7043;
        }
    </style>
</head>
<body>
    <div class="welcomeContainer">
        <p id="welcomeTag"></p>
        <button id="logoutBtn">Logout</button>
    </div>

    <div class="input-container">
        <table>
            <tr>
                <td><label for="id">Employee ID:</label></td>
                <td><input type="number" id="id" required></td>
            </tr>
            <tr>
                <td><label for="name">Name:</label></td>
                <td><input type="text" id="name" required></td>
            </tr>
            <tr>
                <td><label for="dept">Department:</label></td>
                <td><input type="text" id="dept" required></td>
            </tr>
            <tr>
                <td><label for="designation">Designation:</label></td>
                <td><input type="text" id="designation" required></td>
            </tr>
            <tr>
                <td><label for="salary">Salary:</label></td>
                <td><input type="number" id="salary" required></td>
            </tr>
            <tr>
                <td colspan="2"><button id="create-btn">Create</button></td>
            </tr>
        </table>
    </div>

    <h2>Employee List</h2>
    <table id="employee-list">
        <tr>
            <th>Employee Id</th>
            <th>Name</th>
            <th>Department</th>
            <th>Designation</th>
            <th>Salary</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>
    </table>

    <h2>Leave Requests</h2>
    <table id="leaveRequestsTable">
        <tr>
            <th>Employee Name</th>
            <th>Leave Type</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </table>

<script>
const localData = JSON.parse(localStorage.getItem("LoggedInUser"));
if(!localData){
    window.location.href = "../index.html";
} else if(localData.role !== "Admin"){
    window.location.href = "../employeepage/dashboard.html";
}

document.getElementById("welcomeTag").textContent = "Welcome " + localData.username;

document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("LoggedInUser");
    window.location.href = "../index.html";
});

const id = document.getElementById("id");
const name = document.getElementById("name");
const dept = document.getElementById("dept");
const designation = document.getElementById("designation");
const salary = document.getElementById("salary");
const createBtn = document.getElementById("create-btn");
const employeeListTable = document.getElementById("employee-list");

let employees = JSON.parse(localStorage.getItem("employees")) || [];
let editingId = null;

function renderEmployees() {
    employeeListTable.innerHTML = `
        <tr>
            <th>Employee Id</th>
            <th>Name</th>
            <th>Department</th>
            <th>Designation</th>
            <th>Salary</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>`;
    employees.forEach(emp => {
        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${emp.Id}</td>
            <td>${emp.Name}</td>
            <td>${emp.Department}</td>
            <td>${emp.Designation}</td>
            <td>${emp.Salary}</td>
            <td><button class="action-btn edit" data-id="${emp.Id}">Edit</button></td>
            <td><button class="action-btn delete" data-id="${emp.Id}">Delete</button></td>
        `;
        employeeListTable.append(tr);
    });

    document.querySelectorAll(".delete").forEach(btn => {
        btn.addEventListener("click", () => {
            employees = employees.filter(e => e.Id != btn.dataset.id);
            localStorage.setItem("employees", JSON.stringify(employees));
            renderEmployees();
        });
    });

    document.querySelectorAll(".edit").forEach(btn => {
        btn.addEventListener("click", () => {
            let emp = employees.find(e => e.Id == btn.dataset.id);
            id.value = emp.Id;
            name.value = emp.Name;
            dept.value = emp.Department;
            designation.value = emp.Designation;
            salary.value = emp.Salary;
            editingId = emp.Id;
        });
    });
}

renderEmployees();

createBtn.addEventListener("click", () => {
    let newEmployee = {
        Id: id.value.trim(),
        Name: name.value.trim(),
        Department: dept.value.trim(),
        Designation: designation.value.trim(),
        Salary: salary.value.trim()
    };

    if(!newEmployee.Id || !newEmployee.Name || !newEmployee.Department || !newEmployee.Designation || !newEmployee.Salary){
        alert("Please fill in all fields");
        return;
    }

    if(editingId === null){
        if(employees.some(emp => emp.Id === newEmployee.Id)){
            alert("Employee with this ID already exists");
            return;
        }
        employees.push(newEmployee);
        alert("Employee added successfully");
    } else {
        employees = employees.map(emp => emp.Id === editingId ? newEmployee : emp);
        alert("Employee updated successfully");
        editingId = null;
    }

    localStorage.setItem("employees", JSON.stringify(employees));
    renderEmployees();

    id.value = "";
    name.value = "";
    dept.value = "";
    designation.value = "";
    salary.value = "";
});

// Leave Management
const leaveTable = document.getElementById("leaveRequestsTable");

function renderLeaves() {
    let leaveRequests = JSON.parse(localStorage.getItem("leaveRequests")) || [];
    leaveTable.innerHTML = `
        <tr>
            <th>Employee Name</th>
            <th>Leave Type</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Action</th>
        </tr>`;
    leaveRequests.forEach((lr, index) => {
        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${lr.username}</td>
            <td>${lr.type}</td>
            <td>${lr.start}</td>
            <td>${lr.end}</td>
            <td>${lr.reason}</td>
            <td>${lr.status}</td>
            <td>
                ${lr.status === "Pending" ? 
                `<button class="action-btn approve" data-index="${index}">Approve</button>
                 <button class="action-btn reject" data-index="${index}">Reject</button>` 
                : "-"}
            </td>`;
        leaveTable.append(tr);
    });

    document.querySelectorAll(".approve").forEach(btn => {
        btn.addEventListener("click", () => {
            let index = btn.dataset.index;
            let leaves = JSON.parse(localStorage.getItem("leaveRequests")) || [];
            leaves[index].status = "Approved";
            localStorage.setItem("leaveRequests", JSON.stringify(leaves));
            renderLeaves();
        });
    });

    document.querySelectorAll(".reject").forEach(btn => {
        btn.addEventListener("click", () => {
            let index = btn.dataset.index;
            let leaves = JSON.parse(localStorage.getItem("leaveRequests")) || [];
            leaves[index].status = "Rejected";
            localStorage.setItem("leaveRequests", JSON.stringify(leaves));
            renderLeaves();
        });
    });
}

renderLeaves();
</script>
</body>
</html>
